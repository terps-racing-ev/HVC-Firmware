services:
  stm32-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: hvc-firmware:latest
    container_name: hvc-firmware-dev
    volumes:
      - .:/workspace:delegated   # mounts current host folder to /workspace
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: /bin/bash
